[package]
name = "snote-api"
version = "0.1.0"
edition = "2024"

[dependencies]
color-eyre = "0.6.5"
config = { version = "0.15.23", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
sqlx = { version = "0.9.0", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }
tokio = { version = "1.52.3", features = ["full"] }
